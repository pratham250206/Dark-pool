<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dark Pool Cipher — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="auth.css"/>
</head>
<body class="auth-body">

  <!-- Background wood -->
  <div class="auth-bg"></div>

  <div class="auth-wrap">

    <!-- Brand -->
    <div class="auth-brand">
      <span class="auth-logo">⬡</span>
      <h1 class="auth-title">Dark Pool Cipher</h1>
      <p class="auth-sub">Sign in to play, compete, and challenge friends.</p>
    </div>

    <!-- Card -->
    <div class="auth-card">

      <!-- Tabs -->
      <div class="auth-tabs" role="tablist">
        <button class="auth-tab active" id="tabLogin"  role="tab" aria-selected="true"  data-tab="login">Log In</button>
        <button class="auth-tab"        id="tabSignup" role="tab" aria-selected="false" data-tab="signup">Sign Up</button>
      </div>

      <!-- Error banner -->
      <div class="auth-error hidden" id="authError" role="alert"></div>

      <!-- ── Login form ── -->
      <form class="auth-form" id="loginForm" novalidate>
        <div class="field-group">
          <label class="field-label" for="loginEmail">Email</label>
          <input class="field-input" id="loginEmail"  type="email"    placeholder="you@example.com" autocomplete="email" required/>
        </div>
        <div class="field-group">
          <label class="field-label" for="loginPass">Password</label>
          <input class="field-input" id="loginPass"   type="password" placeholder="••••••••" autocomplete="current-password" required/>
        </div>
        <button class="btn btn-primary btn-full auth-submit" type="submit" id="loginBtn">
          <span class="btn-label">Log In</span>
          <span class="btn-spinner hidden" id="loginSpinner">⟳</span>
        </button>
      </form>

      <!-- ── Sign-up form ── -->
      <form class="auth-form hidden" id="signupForm" novalidate>
        <div class="field-group">
          <label class="field-label" for="signupName">Display Name</label>
          <input class="field-input" id="signupName"  type="text"     placeholder="YourGameName" autocomplete="nickname" required/>
        </div>
        <div class="field-group">
          <label class="field-label" for="signupEmail">Email</label>
          <input class="field-input" id="signupEmail" type="email"    placeholder="you@example.com" autocomplete="email" required/>
        </div>
        <div class="field-group">
          <label class="field-label" for="signupPass">Password</label>
          <input class="field-input" id="signupPass"  type="password" placeholder="At least 6 characters" autocomplete="new-password" required/>
        </div>
        <button class="btn btn-primary btn-full auth-submit" type="submit" id="signupBtn">
          <span class="btn-label">Create Account</span>
          <span class="btn-spinner hidden" id="signupSpinner">⟳</span>
        </button>
      </form>

      <!-- Divider -->
      <div class="auth-divider"><span>or</span></div>

      <!-- Google button -->
      <button class="btn-google" id="googleBtn" type="button">
        <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

    </div><!-- /auth-card -->

    <p class="auth-footer">By continuing you accept our <a href="#">Terms</a> and <a href="#">Privacy Policy</a></p>

  </div><!-- /auth-wrap -->

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
</body>
</html>
